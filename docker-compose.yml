services:
  app:
    build: .
    container_name: fastapi_app
    env_file:
      - .env
    ports:
      - '${APP_PORT}:${APP_PORT}'
    depends_on:
      - playwright-server
    environment:
      PLAYWRIGHT_ENDPOINT: ws://playwright-server:3002/
    volumes:
      - .:/app
    networks:
      - shared-network

  playwright-server:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    container_name: playwright_server
    init: true
    stdin_open: true
    tty: true
    user: pwuser
    working_dir: /home/pwuser
    command: >
      /bin/sh -c "npx -y playwright@1.58.0 run-server
      --port 3002
      --host 0.0.0.0"
    ports:
      - '3002:3002'
    networks:
      - shared-network

networks:
  shared-network:
    external: true
