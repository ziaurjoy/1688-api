version: '3.14'

services:
  app:
    build: .
    container_name: fastapi_app
    env_file: .env
    ports:
      - '${APP_PORT}:${APP_PORT}'
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/1688_site
      - MONGO_DB_NAME=1688_site
    volumes:
      - .:/app

  mongo:
    image: mongo:7
    container_name: mongodb
    ports:
      - '${MONGO_PORT}:27017'
    restart: always
    environment:
      MONGO_INITDB_DATABASE: 1688_site
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
